name: NIFTY Intraday Prediction Pipeline

on:
  schedule:
    # 1. Capture the opening hour fraction (03:45 UTC to 03:55 UTC -> 09:15 IST to 09:25 IST)
    - cron: '45-59/5 3 * * 1-5'
    
    # 2. Capture the core market hours (Every 5 mins from 04:00 UTC to 09:59 UTC -> 09:30 IST to 15:25 IST)
    - cron: '*/5 4-9 * * 1-5'
    
    # 3. Capture the exact closing tick (10:00 UTC -> 15:30 IST)
    - cron: '0 10 * * 1-5'

  # Keeps the manual trigger active for testing purposes
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quant Engine
        run: python main.py

      - name: Commit and Push Updated Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md trend_prediction.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "automated intraday update [skip ci]" && git push)
