steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # FIX 1: Forces GitHub to download history so rebasing works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quant Engine
        run: python main.py

      - name: Commit and Push Updated Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md trend_prediction.png
          
          # FIX 2: A proper Bash if-statement instead of chaining with && and ||
          if ! git diff --staged --quiet; then
            echo "Changes detected. Committing..."
            git commit -m "automated intraday update [skip ci]"
            
            echo "Pulling latest changes from remote to prevent conflicts..."
            git pull --rebase origin main
            
            echo "Pushing to repository..."
            git push
          else
            echo "No new market data to update. Skipping commit."
          fi
