name: Automated Stock Prediction Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # 15:30 UTC maps exactly to 21:00 (9:00 PM) IST
    # Runs Monday through Friday
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # Allows you to run it manually anytime with a button click

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the bot permission to update your repo files

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Machine Learning Pipeline
      run: python main.py

    - name: Commit and Push Updated Dashboard
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add README.md trend_prediction.png
        if git diff --staged --quiet; then
          echo "No shifts in predictions today. Skipping update."
        else
          git commit -m "chore: auto-update predictions at 9PM IST [skip ci]"
          git push
        fi
