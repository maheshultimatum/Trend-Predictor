name: Indian Equities Quant Screener

on:
  schedule:
    # Morning Session: 04:00 to 05:55 UTC -> 9:30 AM to 11:25 AM IST
    - cron: '*/5 4-5 * * 1-5'
    # Morning Session Close: 06:00 UTC -> 11:30 AM IST
    - cron: '0 6 * * 1-5'
    
    # Afternoon Session: 08:00 to 08:55 UTC -> 1:30 PM to 2:25 PM IST
    - cron: '*/5 8 * * 1-5'
    # Afternoon Session Close: 09:00 to 09:30 UTC -> 2:30 PM to 3:00 PM IST
    - cron: '0-30/5 9 * * 1-5'
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Multi-Asset Quant Engine
        run: python main.py

      - name: Commit and Push Updated Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          git reset --soft origin/main
          
          git add README.md *.png
          
          if ! git diff --staged --quiet; then
            echo "Changes detected. Committing..."
            git commit -m "automated multi-asset screener update [skip ci]"
            git push origin HEAD:main
          else
            echo "No new market data to update. Skipping commit."
          fi
